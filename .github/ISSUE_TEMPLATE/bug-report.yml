name: Bug Report
description: Report a problem with the container
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more detail you provide, the easier it is to help.

  - type: input
    id: version
    attributes:
      label: Image version
      description: "Which image tag or version are you running? (e.g. `:latest`, `:dev`, `:v1.0.3`)"
      placeholder: ":latest"
    validations:
      required: true

  - type: input
    id: unraid-version
    attributes:
      label: Unraid version
      description: "Your Unraid OS version (e.g. 7.2.4)"
      placeholder: "7.2.4"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU model
      description: "Your NVIDIA GPU model (e.g. RTX 4090, RTX 3080)"
      placeholder: "RTX 4090"
    validations:
      required: true

  - type: input
    id: driver
    attributes:
      label: NVIDIA driver version
      description: "Your host NVIDIA driver version (run `nvidia-smi` to check)"
      placeholder: "595.45.04"
    validations:
      required: true

  - type: dropdown
    id: install-type
    attributes:
      label: Install type
      description: "Is this a fresh install or an upgrade from a previous version?"
      options:
        - Fresh install
        - Upgrade from previous version
        - Existing install (was working before)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Describe the problem clearly. What did you expect to happen, and what actually happened?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "If possible, list the steps to reproduce the problem."
      placeholder: |
        1. Start the container
        2. ...
        3. ...

  - type: textarea
    id: logs
    attributes:
      label: Container logs
      description: |
        Paste relevant container log output here.
        In Unraid, click the container icon → Logs, or run `docker logs A1111-WebUI-Aegisnir`.
        **Sensitive auth values are automatically redacted in logs**, but please review before posting.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: "Anything else that might help -- screenshots, custom COMMANDLINE_ARGS, extra parameters, etc."
