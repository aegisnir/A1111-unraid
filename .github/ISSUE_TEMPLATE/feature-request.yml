name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. I appreciate thoughtful ideas, even if I can't implement everything.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "Describe the pain point or use case that motivates this request."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: "Describe the feature or behavior you'd like. Be as specific as you can."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Have you tried any workarounds, or are there other approaches you've considered?"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: "Anything else -- screenshots, links, related projects, etc."
