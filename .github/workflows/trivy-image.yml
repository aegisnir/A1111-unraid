name: Trivy Image Scan

# Weekly CVE scan of the published :dev image.
# Catches newly disclosed vulnerabilities in OS packages and Python dependencies
# that a source-only scan cannot see. Also useful to run manually before tagging
# a release.
#
# Only fixable HIGH/CRITICAL CVEs are reported (ignore-unfixed: true) to avoid
# constant noise from base-image CVEs that have no upstream fix yet.
#
# exit-code is 0 (informational) because this workflow scans an already-published
# image, not a pending code change. A finding here means you should rebuild the
# image with an updated base or patched packages, then re-run to confirm the fix.

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  scan:
    name: CVE Scan (ghcr.io/:dev)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/aegisnir/a1111-webui-aegisnir:dev
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
