# Hadolint configuration for this Dockerfile.
# Rules are suppressed here only when they conflict with intentional design
# decisions or are impractical for this class of image. Each suppression
# includes an explanation.

ignore:
  # DL3008: Pin versions in apt-get install (e.g. python3=3.10.x).
  # Apt version strings are distribution-specific, change without notice, and
  # require constant maintenance. For a CUDA/Ubuntu base image that is itself
  # pinned by digest, the installed package versions are already implicitly
  # locked through the base layer. The correct mitigation for stale packages
  # is periodic base-image rebuilds, not apt version pins.
  - DL3008
